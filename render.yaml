services:
  - type: web
    name: zhiying-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_MODE
        value: require
      - key: YUNWU_API_KEY
        sync: false
      - key: YUNWU_BASE_URL
        value: https://yunwu.ai/v1
      - key: TEXT_MODEL
        value: gpt-4o-mini
      - key: IMAGE_MODEL
        value: gemini-3.1-flash-image-preview
      - key: ARK_API_KEY
        sync: false
      - key: ARK_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: ARK_MODEL
        value: doubao-seedance-1-0-pro-fast-251015
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: OBJECT_STORAGE_PREFIX
        value: generated-images
      - key: OBJECT_STORAGE_FORCE_PATH_STYLE
        value: "true"
      - key: OBJECT_STORAGE_UPLOAD_ACL
        value: ""
      - key: OBJECT_STORAGE_URL_MODE
        value: public
      - key: OBJECT_STORAGE_SIGNED_URL_EXPIRES_SECONDS
        value: "3600"
      - key: VIDEO_POLL_INTERVAL_MS
        value: 5000
      - key: VIDEO_POLL_MAX_ROUNDS
        value: 60
